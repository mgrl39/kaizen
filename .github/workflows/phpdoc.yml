name: PHP Documentation

on:
  push:
    branches:
      - phpdoc
  pull_request:
    branches:
      - phpdoc

permissions:
  contents: write
  pages: write
  id-token: write
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: dom, curl, mbstring, zip
          coverage: none

      - name: Create docs directory and assets
        run: |
          mkdir -p docs
          # Crear archivo principal
          cat > docs/index.rst << 'EOL'
          ==================
          Kaizen Framework
          ==================

          .. image:: assets/logo.png
             :alt: Kaizen Logo
             :align: center
             :width: 200px

          Bienvenido a la documentación de Kaizen
          ======================================

          Kaizen es un framework moderno para la gestión de cines y películas.

          Contenido
          ---------

          * :doc:`getting-started`
          * :doc:`architecture`
          * :doc:`api-reference`
          EOL

          # Crear directorio de assets
          mkdir -p docs/assets
          # Aquí podrías descargar o copiar tu logo
          # wget -O docs/assets/logo.png https://tu-url/logo.png

      - name: Install PHPDocumentor
        run: |
          wget https://phpdoc.org/phpDocumentor.phar
          chmod +x phpDocumentor.phar
          sudo mv phpDocumentor.phar /usr/local/bin/phpdoc

      - name: Generate Documentation
        run: |
          # Primero generamos la documentación
          phpdoc -d . -t docs/api
          
          # Descargamos y preparamos la plantilla
          wget https://github.com/StartBootstrap/startbootstrap-clean-blog/archive/refs/heads/master.zip
          unzip master.zip
          mv startbootstrap-clean-blog-master/dist/* docs/api/
          
          # Crear template personalizado
          cat > docs/api/css/documentation.css << 'EOL'
          /* Estilos base */
          :root {
            --primary: #0061f2;
            --secondary: #6900c7;
            --success: #00ac69;
            --info: #00cfd5;
            --warning: #f4a100;
            --danger: #e81500;
            --light: #f0f4f8;
            --dark: #1f2d41;
          }

          /* Layout */
          .docs-nav {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 250px;
            padding: 1.5rem;
            overflow-y: auto;
            background: var(--light);
            border-right: 1px solid rgba(0,0,0,.05);
          }

          .docs-content {
            margin-left: 250px;
            padding: 2rem;
          }

          /* Headers */
          .docs-header {
            padding: 3rem 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            margin-bottom: 2rem;
          }

          /* Navigation */
          .docs-nav .nav-link {
            color: var(--dark);
            padding: .5rem 1rem;
            margin: .25rem 0;
            border-radius: .35rem;
            transition: all .15s ease-in-out;
          }

          .docs-nav .nav-link:hover {
            background: rgba(0,0,0,.05);
            color: var(--primary);
          }

          /* Content Cards */
          .docs-card {
            background: white;
            border-radius: .5rem;
            box-shadow: 0 .15rem 1.75rem 0 rgba(31,45,65,.15);
            margin-bottom: 1.5rem;
            padding: 1.5rem;
          }

          /* Code blocks */
          pre {
            background: var(--light);
            border-radius: .35rem;
            padding: 1rem;
            margin: 1rem 0;
          }

          code {
            font-family: 'Fira Code', monospace;
            font-size: .875em;
          }

          /* Tables */
          .docs-table {
            width: 100%;
            margin-bottom: 1rem;
          }

          .docs-table th,
          .docs-table td {
            padding: .75rem;
            border-bottom: 1px solid var(--light);
          }

          /* Search */
          .docs-search {
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: white;
            border-radius: .35rem;
            box-shadow: 0 .15rem 1.75rem 0 rgba(31,45,65,.15);
          }

          /* Dark mode support */
          @media (prefers-color-scheme: dark) {
            body {
              background: var(--dark);
              color: var(--light);
            }

            .docs-nav {
              background: rgba(255,255,255,.05);
              border-color: rgba(255,255,255,.05);
            }

            .docs-card {
              background: rgba(255,255,255,.05);
            }

            pre {
              background: rgba(0,0,0,.2);
            }
          }
          EOL

          # Añadir fuentes y CDN necesarios
          cat > docs/api/header.html << 'EOL'
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
          <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
          <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css" rel="stylesheet">
          <link href="css/documentation.css" rel="stylesheet">
          EOL

          # Insertar header personalizado
          find docs/api -name "*.html" -exec sed -i '/<\/head>/ r docs/api/header.html' {} \;

          # Añadir scripts
          cat >> docs/api/footer.html << 'EOL'
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
          <script>
            // Inicializar tooltips
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
              return new bootstrap.Tooltip(tooltipTriggerEl)
            })

            // Resaltado de código
            Prism.highlightAll();
          </script>
          EOL

          find docs/api -name "*.html" -exec sed -i '/<\/body>/ r docs/api/footer.html' {} \;

      - name: Debug Information
        run: |
          echo "Checking deployment prerequisites..."
          echo "Docs directory exists: $(test -d docs && echo 'yes' || echo 'no')"
          echo "Docs/api directory exists: $(test -d docs/api && echo 'yes' || echo 'no')"
          ls -la docs/ || true
          ls -la docs/api/ || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        env:
          ACTIONS_STEP_DEBUG: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api
          destination_dir: docs
          enable_jekyll: false
          commit_message: 'docs: update API documentation' 