name: PHP Documentation

on:
  push:
    branches:
      - phpdoc
  pull_request:
    branches:
      - phpdoc

permissions:
  contents: write
  pages: write
  id-token: write
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: dom, curl, mbstring, zip
          coverage: none

      - name: Create docs directory
        run: |
          mkdir -p docs
          echo "# Kaizen Documentation" > docs/index.rst
          echo "===================" >> docs/index.rst
          echo "" >> docs/index.rst
          echo "Welcome to Kaizen documentation." >> docs/index.rst

      - name: Install PHPDocumentor
        run: |
          wget https://phpdoc.org/phpDocumentor.phar
          chmod +x phpDocumentor.phar
          sudo mv phpDocumentor.phar /usr/local/bin/phpdoc

      - name: Generate Documentation
        run: phpdoc -d . -t docs/api --template=clean

      - name: Debug Information
        run: |
          echo "Checking deployment prerequisites..."
          echo "Docs directory exists: $(test -d docs && echo 'yes' || echo 'no')"
          echo "Docs/api directory exists: $(test -d docs/api && echo 'yes' || echo 'no')"
          ls -la docs/ || true
          ls -la docs/api/ || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        env:
          ACTIONS_STEP_DEBUG: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api
          destination_dir: docs
          enable_jekyll: false
          commit_message: 'docs: update API documentation' 